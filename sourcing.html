<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="root.css">
  <title>Sourcing Solutions - Harvics Global Ventures</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;background:var(--offwhite);color:var(--text)}
    header{
      background:var(--offwhite);
      position:sticky;top:0;z-index:1000;color:var(--burgundy);
      border-bottom:1px solid var(--divider);
      box-shadow:none;
    }
    .top-bar{max-width:1200px;margin:0 auto;padding:8px 16px;display:flex;align-items:center;justify-content:space-between;gap:16px}
    .clock{width:44px;height:44px;border-radius:0;background:var(--offwhite);box-shadow:none;border:1px solid var(--divider);display:block;position:relative;flex:0 0 44px}
    .clock:before{content:"";position:absolute;inset:2px;border-radius:0;border:1px solid var(--gold);opacity:0.8}
    .clock .hand{position:absolute;bottom:50%;left:50%;transform-origin:bottom;background:var(--burgundy);z-index:2}
    .hand.hour{width:2px;height:10px;border-radius:2px;opacity:1}
    .hand.min{width:2px;height:14px;border-radius:2px;opacity:0.9}
    .hand.sec{width:1px;height:16px;background:var(--burgundy);border-radius:2px;opacity:0.8}
    .clock .dot{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:4px;height:4px;background:var(--gold);border-radius:0;z-index:3}
    .logo{font-weight:700;letter-spacing:0.08em;color:var(--gold-bright)}
    .language-switcher{display:flex;align-items:center;gap:8px;font-size:13px}
    .language-switcher select{padding:0 4px;font-size:13px;border:none;background:transparent;color:var(--burgundy);appearance:none}
    .language-switcher .login-link{padding:0;font-size:13px;border:none;background:transparent;text-decoration:none;color:var(--burgundy)}
    .language-switcher .login-link:hover{text-decoration:underline}
    .main-nav{background:transparent;border-top:1px solid var(--divider)}
    .main-menu{max-width:1200px;margin:0 auto;list-style:none;display:flex;align-items:center;gap:20px;padding:0 16px}
    .main-menu>li{position:relative}
    .main-menu>li>a{display:block;padding:12px 0;text-decoration:none;color:var(--burgundy);font-size:12px;letter-spacing:0.02em;font-weight:500;transition:opacity .2s ease}
    .main-menu>li>a:hover{opacity:.9}
    /* Page Layout Styles */
    .container {
      max-width: 1200px;
      margin: 24px auto;
      padding: 0 16px;
      display: flex;
      gap: 32px;
    }

    .sidebar {
      width: 240px;
      flex-shrink: 0;
      position: sticky;
      top: 120px;
      height: fit-content;
    }

    .content {
      flex: 1;
    }

    /* Filters */
    .filter-group {
      margin-bottom: 24px;
      border-bottom: 1px solid var(--divider);
      padding-bottom: 16px;
    }

    .filter-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 12px;
      text-transform: uppercase;
    }

    .filter-list {
      list-style: none;
    }

    .filter-list li {
      margin-bottom: 8px;
    }

    .filter-list a {
      text-decoration: none;
      color: var(--text-2);
      font-size: 14px;
      display: flex;
      justify-content: space-between;
      transition: color 0.2s;
    }

    .filter-list a:hover {
      color: var(--burgundy);
      text-decoration: underline;
    }

    /* Service Grid */
    .page-title {
      font-size: 32px;
      font-weight: 600;
      margin-bottom: 12px;
      color: var(--burgundy);
    }
    
    .page-subtitle {
      font-size: 16px;
      color: var(--text-2);
      margin-bottom: 32px;
      max-width: 800px;
      line-height: 1.6;
    }

    .service-section {
      margin-bottom: 48px;
    }
    
    .service-category-title {
      font-size: 24px;
      font-weight: 500;
      margin-bottom: 24px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--divider);
      color: var(--burgundy);
    }

    .service-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 24px;
    }

    .service-card {
      background: var(--offwhite);
      border: 1px solid var(--divider);
      border-radius: 0;
      overflow: hidden;
      transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
      box-shadow: var(--card-shadow);
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .service-card:hover {
      transform: translateY(-8px);
      box-shadow: none;
    }

    .service-header {
      padding: 24px;
      background: var(--offwhite);
      border-bottom: 1px solid var(--divider);
      position: relative;
      background-size: cover;
      background-position: center;
      color: var(--burgundy);
      z-index: 1;
      min-height: 140px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }
    
    .service-icon {
      font-size: 32px;
      margin-bottom: 16px;
      display: block;
    }

    .service-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--burgundy);
      margin-bottom: 8px;
    }
    
    .service-subtitle {
      font-size: 13px;
      color: var(--text);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 600;
    }

    .service-body {
      padding: 24px;
      flex: 1;
    }

    .service-list {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .service-list li {
      position: relative;
      padding-left: 20px;
      margin-bottom: 10px;
      font-size: 14px;
      color: var(--text-2);
      line-height: 1.5;
    }

    .service-list li::before {
      content: "•";
      position: absolute;
      left: 0;
      color: var(--gold);
      font-weight: bold;
    }

    /* AI Panel Mini */
    .ai-fab {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--offwhite);
      color: var(--burgundy);
      padding: 12px 20px;
      border-radius: 2px;
      cursor: pointer;
      box-shadow: none;
      font-size: 14px;
      font-weight: 500;
      z-index: 2000;
      border: 1px solid var(--divider);
    }
    
    /* AI Overlay */
    .ai-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: var(--offwhite);
        z-index: 2100;
        align-items: center;
        justify-content: center;
    }
    .ai-sheet {
      width: min(360px,90vw);
      background: var(--offwhite);
      border-radius: 2px;
      box-shadow: none;
      border: 1px solid var(--divider);
      padding: 16px;
      margin: 0 20px 20px 0;
    }
    .ai-row {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .ai-row textarea {
      min-height: 100px;
      resize: vertical;
      padding: 8px 10px;
      font-size: 14px;
      border-radius: 2px;
      border: 1px solid var(--divider);
    }
    .ai-row button {
      align-self: flex-start;
      padding: 8px 16px;
      font-size: 14px;
      border-radius: 2px;
      border: 1px solid var(--divider);
      background: var(--offwhite);
      color: var(--burgundy);
      cursor: pointer;
    }
    .ai-output {
      margin-top: 12px;
      font-size: 14px;
      white-space: pre-wrap;
    }

    @media (max-width: 900px) {
      .container { flex-direction: column; }
      .sidebar { width: 100%; position: static; margin-bottom: 24px; }
      .service-grid { grid-template-columns: 1fr; }
    }
    /* Footer - Original Creamish/Burgundy/Gold Theme */
    .site-footer { background: var(--offwhite); color: var(--burgundy); padding: 80px 0 0; font-size: 15px; border-top: 4px solid var(--gold); margin-top: 0; }
    .footer-top { max-width: 1200px; margin: 0 auto; padding: 0 16px 60px; display: grid; grid-template-columns: 1.2fr 0.9fr 0.9fr 1.2fr; gap: 40px; border-bottom: 1px solid var(--gold); }
    .footer-col h4 { color: var(--burgundy); font-size: 15px; margin-bottom: 24px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; opacity: 1; }
    .footer-col ul { list-style: none; padding: 0; margin: 0; }
    .footer-col li { margin-bottom: 16px; }
    .footer-col a { color: var(--burgundy); text-decoration: none; transition: all 0.2s; font-size: 15px; opacity: 0.8; }
    .footer-col a:hover { color: var(--gold); padding-left: 4px; opacity: 1; }
    .footer-brand { font-size: 32px; font-weight: 700; margin-bottom: 20px; letter-spacing: 0.02em; color: var(--burgundy); }
    .footer-desc { color: var(--burgundy); line-height: 1.7; margin-bottom: 24px; max-width: 320px; font-size: 15px; opacity: 0.8; }
    .footer-bottom { max-width: 1200px; margin: 0 auto; padding: 32px 16px; display: flex; justify-content: space-between; align-items: center; color: var(--burgundy); font-size: 14px; opacity: 0.8; }
    .footer-social { display: flex; gap: 16px; margin-top: 24px; }
    .footer-social a { 
      color: var(--burgundy); opacity: 0.7; transition: all 0.3s ease; 
      width: 40px; height: 40px; border-radius: 0; background: transparent; border: 1px solid var(--burgundy);
      display: grid; place-items: center;
    }
    .footer-social a:hover { opacity: 1; background: var(--burgundy); color: var(--gold); border-color: var(--burgundy); transform: translateY(-3px); }
    .footer-social svg { width: 20px; height: 20px; }
    
    .newsletter-form { display: flex; gap: 10px; margin-top: 20px; }
    .newsletter-input { 
      background: var(--offwhite); border: 1px solid var(--burgundy); 
      padding: 12px 16px; border-radius: 2px; color: var(--burgundy); flex: 1; font-size: 15px; outline: none; 
      transition: border-color 0.3s;
    }
    .newsletter-input:focus { border-color: var(--gold); background: var(--offwhite); }
    .newsletter-btn { 
      background: var(--offwhite); color: var(--burgundy); border: 1px solid var(--divider); padding: 12px 24px; 
      border-radius: 2px; cursor: pointer; font-weight: 600; font-size: 15px; 
      transition: all 0.3s; white-space: nowrap; 
    }
    .newsletter-btn:hover { background: var(--gold); color: var(--burgundy); transform: translateY(-1px); box-shadow: none; }
    
    @media (max-width: 1024px) { .footer-top { gap: 24px; } }
    @media (max-width: 900px) { .footer-top { grid-template-columns: 1fr 1fr; gap: 40px; } }
    @media (max-width: 600px) { .footer-top { grid-template-columns: 1fr; } .footer-bottom { flex-direction: column; gap: 20px; text-align: center; } }

  </style>
</head>
<body>
  <div id="site-shell"></div>

  <main id="page-content">
  <script>try{window.injectLandingBanner&&window.injectLandingBanner()}catch(e){}</script>
  <div class="container">
    <!-- SIDEBAR FILTERS -->
    <aside class="sidebar">
      <div class="filter-group">
        <div class="filter-title">Solutions Menu</div>
        <ul class="filter-list" id="category-list">
          <!-- Populated by JS -->
        </ul>
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="content">
      <h1 class="page-title">Global Sourcing Solutions</h1>
      <p class="page-subtitle">Harvics delivers integrated sourcing ecosystems — from supplier discovery to final delivery — across multi-industry verticals worldwide.</p>
      
      <div id="services-container">
        <!-- Populated by JS -->
      </div>
    </main>
  </div>
  </main>

  <!-- AI FAB -->
  <div class="ai-fab" id="ai-fab">Ask Harvics AI</div>
  
  <div class="ai-overlay" id="ai-overlay">
    <div class="ai-sheet">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div style="font-weight:600">Harvics AI Assistant</div>
        <button id="ai-close" style="border:none;background:transparent;font-size:20px;line-height:1;cursor:pointer">×</button>
      </div>
      <div class="ai-row">
        <textarea id="ai-input" placeholder="Ask about our sourcing capabilities..."></textarea>
        <button id="ai-send">Ask AI</button>
        <div class="ai-output" id="ai-output"></div>
      </div>
    </div>
  </div>

  <script src="product-data.js"></script>
  <script src="script.js"></script>
    
  <script>
    const sourcingData = [
      {
        id: "manufacturing",
        title: "Manufacturing Excellence",
        services: [
          {
            title: "OEM / ODM Manufacturing Solutions",
            subtitle: "From Concept to Mass Production",
            icon: "🏭",
            keywords: "factory, manufacturing, industrial",
            items: [
              "Custom Product Manufacturing",
              "Original Equipment Manufacturing (OEM)",
              "Original Design Manufacturing (ODM)",
              "Industrial Engineering Support",
              "Prototype & Sample Development",
              "Tooling & Mold Fabrication",
              "Scalable Production Planning"
            ]
          },
          {
            title: "Private Label & Brand Development",
            subtitle: "Build Your Brand. Globally.",
            icon: "🏷️",
            keywords: "brand, label, packaging",
            items: [
              "End-to-End Private Label Solutions",
              "Brand Identity Development",
              "Retail-Ready Packaging Engineering",
              "Product Customization",

            ]
          },
          {

            ]
          }
        ]
      },
      {
        id: "quality",

        services: [
          {
            title: "Quality Assurance & Inspection Services",
            subtitle: "Precision. Compliance. Reliability.",
            icon: "🔍",
            keywords: "inspection, quality, check",
            items: [
              "Pre-Production Quality Inspection",

              "Pre-Shipment Inspection",
              "Container Loading Supervision",
              "Third-Party Laboratory Testing",
              "Social & Ethical Compliance Audits",
              "Supplier Performance Evaluation"
            ]
          },
          {
            title: "Regulatory Compliance & Certifications",
            subtitle: "Global Standards. Guaranteed Compliance.",
            icon: "📜",
            keywords: "document, compliance, stamp",
            items: [
              "ISO Certification Coordination",
              "CE / FDA / RoHS / REACH Compliance",
              "ESG & Sustainability Standards",
              "Social Compliance (BSCI, SEDEX, SA8000)",
              "Technical Documentation Management",
              "Import/Export Regulatory Advisory"
            ]
          }
        ]
      },
      {
        id: "logistics",
        title: "Logistics & Distribution",
        services: [
          {
            title: "Global Logistics & Distribution",
            subtitle: "Seamless Global Movement of Goods",
            icon: "🚢",
            keywords: "ship, cargo, container",
            items: [
              "International Freight (Air, Sea, Rail, Road)",
              "Customs Brokerage & Clearance",
              "Bonded & Regional Warehousing",
              "Cross-Docking & Consolidation",
              "Distribution Center Management",
              "Dropshipping & Fulfillment",
              "Last-Mile Coordination"
            ]
          },
          {
            title: "Integrated Supply Chain Management",
            subtitle: "Optimized. Intelligent. Resilient.",
            icon: "⛓️",
            keywords: "network, connection, logistics",
            items: [
              "End-to-End Supply Chain Design",
              "Demand Forecasting & Planning",

              "Vendor Performance Analytics",
              "Cost Optimization Programs"
            ]
          }
        ]
      },
      {
        id: "strategy",
        title: "Strategy & Consulting",
        services: [
          {
            title: "Global Supplier Network",
            subtitle: "Verified. Vetted. Globally Connected.",
            icon: "🌐",
            keywords: "map, network, globe",
            items: [

              "Strategic Vendor Onboarding",
              "Long-Term Supplier Partnerships",
              "Capacity & Capability Mapping",
              "Regional Trade Intelligence"
            ]
          },
          {
            title: "Strategic Procurement & Advisory",
            subtitle: "Premium Strategic Service",
            icon: "📈",
            keywords: "strategy, chess, graph",
            items: [
              "Global Procurement Strategy",
              "Cost Reduction & Negotiation Programs",
              "Category Management",
              "Tender & Bid Management",
              "Procurement Digitalization",
              "Spend Analytics & Reporting"
            ]
          },
          {
            title: "Market Entry & Global Expansion",
            subtitle: "Expand Your Reach",
            icon: "🚀",
            keywords: "growth, chart, expansion",
            items: [
              "Country-Specific Sourcing Strategy",
              "Local Manufacturing Partnerships",
              "Trade Policy Advisory",

            ]
          }
        ]
      },
      {
        id: "sustainability",
        title: "Sustainability & Ethics",
        services: [
          {
            title: "Sustainable & Ethical Sourcing",
            subtitle: "Green Supply Chain Development",
            icon: "🌱",
            keywords: "green, plant, eco",
            items: [
              "Carbon Footprint Monitoring",
              "Responsible Raw Material Sourcing",
              "Ethical Labor Compliance Monitoring",
              "ESG Reporting & Advisory",
              "Green Supply Chain Development"
            ]
          }
        ]
      },
      {
        id: "technology",
        title: "Technology & Innovation",
        services: [
          {
            title: "Technology-Driven Sourcing",
            subtitle: "AI-Powered & Future Ready",
            icon: "🤖",
            keywords: "technology, ai, digital",
            items: [
              "AI-Powered Supplier Matching",
              "Digital Procurement Platforms",
              "Blockchain Traceability Systems",
              "Smart Contract Procurement",
              "Real-Time Supply Chain Visibility"
            ]
          }
        ]
      },
      {
        id: "government",
        title: "Government & Industrial Projects",
        services: [
          {
            title: "Turnkey Industrial & Government Procurement",
            subtitle: "Infrastructure & Public Sector",
            icon: "🏛️",
            keywords: "government, building, infrastructure",
            items: [
              "Infrastructure Material Sourcing",
              "Industrial Equipment Procurement",
              "EPC Support Services",
              "Public Sector & Government Contracts",
              "End-to-End Project Procurement Management"
            ]
          }
        ]
      }
    ];

    document.addEventListener('DOMContentLoaded', () => {
      // 1. Populate Sidebar
      const sidebarList = document.getElementById('category-list');
      sourcingData.forEach(cat => {
        const li = document.createElement('li');
        li.innerHTML = `<a href="#${cat.id}">${cat.title}</a>`;
        sidebarList.appendChild(li);
      });

      // 2. Inject anchor targets for footer/sidebar links
      const contentRoot = document.querySelector('.content');
      if(contentRoot){
        sourcingData.forEach(cat => {
          if(!document.getElementById(cat.id)){
            const anchor = document.createElement('span');
            anchor.id = cat.id;
            anchor.className = 'section-anchor';
            contentRoot.insertBefore(anchor, contentRoot.firstChild);
          }
        });
      }

      // 3. Render Sourcing Services
      const servicesContainer = document.getElementById('services-container');
      if (servicesContainer && productCatalog.sourcing) {
        servicesContainer.innerHTML = `
          <div class="service-category-title">Core Services</div>
          <div class="service-grid">
            ${productCatalog.sourcing.map(service => {
              const imageUrl = getProductImage(service.keywords);
              return `
              <div class="service-card">
                <div class="service-header" style="background-image: url('${imageUrl}');">
                  <span class="service-icon">${service.icon}</span>
                  <h3 class="service-title">${service.name}</h3>
                </div>
                <div class="service-body">
                  <p class="service-desc" style="color:var(--text-2); font-size:14px; line-height:1.6;">${service.desc}</p>
                </div>
              </div>
              `;
            }).join('')}
          </div>
        `;
      }

      // AI Logic
      const aiFab = document.getElementById('ai-fab');
      const aiOverlayPanel = document.getElementById('ai-overlay');
      const aiClose = document.getElementById('ai-close');
      const aiSend = document.getElementById('ai-send');
      const aiInput = document.getElementById('ai-input');
      const aiOutput = document.getElementById('ai-output');

      aiFab.addEventListener('click', () => {
        aiOverlayPanel.style.display = 'flex';
      });

      aiClose.addEventListener('click', () => {
        aiOverlayPanel.style.display = 'none';
      });

      aiSend.addEventListener('click', () => {
        const q = aiInput.value.trim();
        if(!q) return;
        
        aiSend.textContent = 'Thinking...';
        aiSend.disabled = true;
        
        let response = "Harvics Sourcing AI: ";
        if(q.toLowerCase().includes('supplier') || q.toLowerCase().includes('factory')) {
           response += "We have a vetted network of over 500+ manufacturers across Asia and Europe. We can help you identify pre-qualified suppliers for your specific needs.";
        } else if(q.toLowerCase().includes('logistics') || q.toLowerCase().includes('shipping')) {
           response += "Our logistics team handles everything from EXW to DDP. We coordinate air, sea, and rail freight with customs clearance included.";
        } else if(q.toLowerCase().includes('quality') || q.toLowerCase().includes('inspection')) {
           response += "We offer comprehensive QA services including pre-production checks, in-line inspection, and pre-shipment verification to ensure zero defects.";
        } else {
           response += "We offer end-to-end sourcing solutions including manufacturing, quality assurance, logistics, and strategic consulting. How can we assist with your project?";
        }

        aiOutput.textContent = response;
        aiSend.textContent = 'Ask AI';
        aiSend.disabled = false;
      });
    });
    
    const header = document.querySelector('header');
  </script>
</body>
</html>
