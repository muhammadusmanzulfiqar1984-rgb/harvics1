<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="root.css">
  <title>Textiles &amp; Apparels - Harvics Global Ventures</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;background:var(--offwhite);color:var(--text)}
    header{
      background:var(--offwhite);
      position:sticky;top:0;z-index:1000;color:var(--burgundy);
      border-bottom:1px solid var(--divider);
      box-shadow:none;
    }
    .top-bar{max-width:1200px;margin:0 auto;padding:8px 16px;display:flex;align-items:center;justify-content:space-between;gap:16px}
    .clock{width:44px;height:44px;border-radius:0;background:var(--offwhite);box-shadow:none;border:1px solid var(--divider);display:block;position:relative;flex:0 0 44px}
    .clock:before{content:"";position:absolute;inset:2px;border-radius:0;border:1px solid var(--gold);opacity:0.8}
    .clock .hand{position:absolute;bottom:50%;left:50%;transform-origin:bottom;background:var(--burgundy);z-index:2}
    .hand.hour{width:2px;height:10px;border-radius:2px;opacity:1}
    .hand.min{width:2px;height:14px;border-radius:2px;opacity:0.9}
    .hand.sec{width:1px;height:16px;background:var(--burgundy);border-radius:2px;opacity:0.8}
    .clock .dot{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:4px;height:4px;background:var(--gold);border-radius:0;z-index:3}
    .logo{font-weight:700;letter-spacing:0.08em;color:var(--gold-bright)}
    .language-switcher{display:flex;align-items:center;gap:8px;font-size:13px}
    .language-switcher select{padding:0 4px;font-size:13px;border:none;background:transparent;color:var(--burgundy);appearance:none}
    .language-switcher .login-link{padding:0;font-size:13px;border:none;background:transparent;text-decoration:none;color:var(--burgundy)}
    .language-switcher .login-link:hover{text-decoration:underline}
    .main-nav{background:transparent;border-top:1px solid var(--divider)}
    .main-menu{max-width:1200px;margin:0 auto;list-style:none;display:flex;align-items:center;gap:20px;padding:0 16px}
    .main-menu>li{position:relative}
    .main-menu>li>a{display:block;padding:12px 0;text-decoration:none;color:var(--burgundy);font-size:12px;letter-spacing:0.02em;font-weight:500;transition:opacity .2s ease}
    .main-menu>li>a:hover{opacity:.9}
    /* Page Layout Styles */
    .container {
      max-width: 1200px;
      margin: 24px auto;
      padding: 0 16px;
      display: flex;
      gap: 32px;
    }

    .sidebar {
      width: 240px;
      flex-shrink: 0;
      position: sticky;
      top: 120px;
      height: fit-content;
    }

    .content {
      flex: 1;
    }

    /* Filters */
    .filter-group {
      margin-bottom: 24px;
      border-bottom: 1px solid var(--divider);
      padding-bottom: 16px;
    }

    .filter-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 12px;
      text-transform: uppercase;
    }

    .filter-list {
      list-style: none;
    }

    .filter-list li {
      margin-bottom: 8px;
    }

    .filter-list a {
      text-decoration: none;
      color: var(--text-2);
      font-size: 14px;
      display: flex;
      justify-content: space-between;
      transition: color 0.2s;
    }


    .filter-list a:hover {
      color: var(--burgundy);
      text-decoration: underline;
    }

    /* Product Grid */
    .page-title {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 24px;
      color: var(--burgundy);
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 24px;
    }

    .product-card {
      background: var(--offwhite);
      border: 1px solid var(--divider);
      border-radius: 0;
      overflow: hidden;
      transition: transform 0.2s;
    }

    .product-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 12px 32px rgba(90,15,26,0.12);
    }

    .product-image {
      height: 320px;
      background: var(--divider);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-2);
    }

    .product-info {
      padding: 12px;
    }

    .product-name {
      font-size: 14px;
      margin-bottom: 4px;
      font-weight: 500;
    }

    .product-price {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-2);
    }

    /* AI Panel Mini */
    .ai-fab {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--offwhite);
      color: var(--burgundy);
      padding: 12px 20px;
      border-radius: 2px;
      cursor: pointer;
      box-shadow: none;
      font-size: 14px;
      font-weight: 500;
      z-index: 2000;
      border: 1px solid var(--divider);
    }
  </style>
</head>
<body>
  <div id="site-shell"></div>

  <main id="page-content">
  <script>try{window.injectLandingBanner&&window.injectLandingBanner()}catch(e){}</script>
  <div class="container">
    <!-- SIDEBAR FILTERS -->
    <aside class="sidebar">
      <div class="filter-group">
        <div class="filter-title">Categories</div>
        <ul class="filter-list" id="category-list">
          <!-- Populated by JS -->
        </ul>
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="content" id="main-content">
      <!-- Populated by JS -->
    </main>
  </div>
  </main>

  <script src="product-data.js"></script>
  <script src="script.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // 1. Render Textiles Content
      if (typeof productCatalog !== 'undefined' && productCatalog.textiles) {
        const mainContent = document.getElementById('main-content');
        const categoryList = document.getElementById('category-list');
        
        let html = '<h1 class="page-title">Textiles & Apparels</h1>';
        let sidebarHtml = '';

        const sections = [
          { key: 'men', title: "Men's Apparel" },
          { key: 'women', title: "Women's Apparel" },
          { key: 'kids', title: "Kids & Baby" },
          { key: 'home', title: "Home Textiles" }
        ];

        sections.forEach(section => {
          const products = productCatalog.textiles[section.key];
          if (products && products.length > 0) {
            sidebarHtml += `<li><a href="#${section.key}">${section.title}</a></li>`;
            
            html += `
              <section id="${section.key}" style="margin-bottom: 64px; scroll-margin-top: 120px;">
                <h2 style="font-size: 20px; margin-bottom: 24px; border-bottom: 1px solid var(--divider); padding-bottom: 8px; color: var(--burgundy);">${section.title}</h2>
                <div class="product-grid">
                  ${products.map(p => {
                     const imageUrl = getProductImage(p.keywords);
                     return `
                      <div class="product-card">
                        <div class="product-image" style="background-color: var(--bg-secondary); background-image: url('${imageUrl}'); background-size: cover; background-position: center;"></div>
                        <div class="product-info">
                          <div class="product-name">${p.name}</div>
                          <div class="product-price">${p.price}</div>
                        </div>
                      </div>
                     `;
                  }).join('')}
                </div>
              </section>
            `;
          }
        });

        mainContent.innerHTML = html;
        categoryList.innerHTML = sidebarHtml;
      }
      
      // AI Panel Logic
      const aiFab = document.getElementById("ai-fab");
      const aiPanel = document.getElementById("ai-panel-overlay");
      const closeAi = document.getElementById("close-ai");
      
      if(aiFab && aiPanel && closeAi) {
        aiFab.addEventListener("click", () => { aiPanel.style.display = "block"; aiFab.style.display = "none"; });
        closeAi.addEventListener("click", () => { aiPanel.style.display = "none"; aiFab.style.display = "block"; });
      }

      const aiBtn = document.getElementById("ai-send");
      const aiInp = document.getElementById("ai-input");
      const aiOut = document.getElementById("ai-output");
      
      if (aiBtn) {
        aiBtn.addEventListener("click", () => {
          const txt = aiInp.value.trim();
          if (!txt) return;
          aiBtn.disabled = true;
          aiOut.textContent = "Thinking...";
          intelligenceLayer.askAi(txt).then(ans => aiOut.textContent = ans).finally(() => aiBtn.disabled = false);
        });
      }
    });
  </script>

  <div class="ai-fab" id="ai-fab">Ask AI</div>



  <!-- AI Panel -->
  <div class="ai-panel" id="ai-panel-overlay" style="display:none; position:fixed; bottom:80px; right:24px; width:320px; z-index:2000; box-shadow: none; background: var(--offwhite); padding: 16px; border-radius: 2px; border: 1px solid var(--divider);">
    <div class="ai-panel-title" style="font-weight: 600; margin-bottom: 8px;">Harvics AI Assistant <span style="float:right; cursor:pointer;" id="close-ai">×</span></div>
    <div class="ai-panel-note" style="font-size: 12px; color: var(--text-2); margin-bottom: 12px;">Ask about fabrics, sizes, or custom orders.</div>
    <div class="ai-row" style="display: flex; flex-direction: column; gap: 8px;">
      <textarea id="ai-input" placeholder="Ask something..." style="width: 100%; padding: 8px; border: 1px solid var(--divider); border-radius: 2px; resize: vertical; min-height: 60px;"></textarea>
      <button id="ai-send" style="padding: 8px; background: var(--offwhite); color: var(--burgundy); border: 1px solid var(--divider); border-radius: 2px; cursor: pointer;">Ask AI</button>
      <div class="ai-output" id="ai-output" style="font-size: 13px; line-height: 1.4; color: var(--text); max-height: 200px; overflow-y: auto;"></div>
    </div>
  </div>

</body>
</html>
