<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="root.css">
  <title>Industrial &amp; Chemical Solutions - Harvics Global Ventures</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;background:var(--offwhite);color:var(--text)}
    header{
      background:var(--offwhite);
      position:sticky;top:0;z-index:1000;color:var(--burgundy);
      border-bottom:1px solid var(--divider);
      box-shadow:none;
    }
    .top-bar{max-width:1200px;margin:0 auto;padding:8px 16px;display:flex;align-items:center;justify-content:space-between;gap:16px}
    .clock{width:44px;height:44px;border-radius:0;background:var(--offwhite);box-shadow:none;border:1px solid var(--divider);display:block;position:relative;flex:0 0 44px}
    .clock:before{content:"";position:absolute;inset:2px;border-radius:0;border:1px solid var(--gold);opacity:0.8}
    .clock .hand{position:absolute;bottom:50%;left:50%;transform-origin:bottom;background:var(--burgundy);z-index:2}
    .hand.hour{width:2px;height:10px;border-radius:2px;opacity:1}
    .hand.min{width:2px;height:14px;border-radius:2px;opacity:0.9}
    .hand.sec{width:1px;height:16px;background:var(--burgundy);border-radius:2px;opacity:0.8}
    .clock .dot{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:4px;height:4px;background:var(--gold);border-radius:0;z-index:3}
    .logo{font-weight:700;letter-spacing:0.08em;color:var(--gold-bright)}
    .language-switcher{display:flex;align-items:center;gap:8px;font-size:13px}
    .language-switcher select{padding:0 4px;font-size:13px;border:none;background:transparent;color:var(--burgundy);appearance:none}
    .language-switcher .login-link{padding:0;font-size:13px;border:none;background:transparent;text-decoration:none;color:var(--burgundy)}
    .language-switcher .login-link:hover{text-decoration:underline}
    .main-nav{background:transparent;border-top:1px solid var(--divider)}
    .main-menu{max-width:1200px;margin:0 auto;list-style:none;display:flex;align-items:center;gap:20px;padding:0 16px}
    .main-menu>li{position:relative}
    .main-menu>li>a{display:block;padding:12px 0;text-decoration:none;color:var(--burgundy);font-size:12px;letter-spacing:0.02em;font-weight:500;transition:opacity .2s ease}
    .main-menu>li>a:hover{opacity:.9}
    /* Page Layout Styles */
    .container {
      max-width: 1200px;
      margin: 24px auto;
      padding: 0 16px;
      display: flex;
      gap: 32px;
    }

    .sidebar {
      width: 240px;
      flex-shrink: 0;
      position: sticky;
      top: 120px;
      height: fit-content;
    }

    .content {
      flex: 1;
    }

    /* Filters */
    .filter-group {
      margin-bottom: 24px;
      border-bottom: 1px solid var(--divider);
      padding-bottom: 16px;
    }

    .filter-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 12px;
      text-transform: uppercase;
    }

    .filter-list {
      list-style: none;
    }

    .filter-list li {
      margin-bottom: 8px;
    }

    .filter-list a {
      text-decoration: none;
      color: var(--text-2);
      font-size: 14px;
      display: flex;
      justify-content: space-between;
      transition: color 0.2s;
    }

    .filter-list a:hover {
      color: var(--burgundy);
      text-decoration: underline;
    }

    /* Product Grid */
    .page-title {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 24px;
      color: var(--burgundy);
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 24px;
    }

    .product-card {
      background: var(--offwhite);
      border: 1px solid var(--divider);
      border-radius: 0;
      overflow: hidden;
      transition: transform 0.2s;
    }

    .product-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 12px 32px rgba(90,15,26,0.12);
    }

    .product-image {
      height: 200px;
      background: var(--divider);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-2);
    }

    .product-info {
      padding: 12px;
    }

    .product-name {
      font-size: 14px;
      margin-bottom: 4px;
      font-weight: 500;
    }

    .product-price {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-2);
    }

    /* AI Panel Mini */
    .ai-fab {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--offwhite);
      color: var(--burgundy);
      padding: 12px 20px;
      border-radius: 2px;
      cursor: pointer;
      box-shadow: none;
      font-size: 14px;
      font-weight: 500;
      z-index: 2000;
      border: 1px solid var(--divider);
    }
    
    /* Footer - Original Creamish/Burgundy/Gold Theme */
    .site-footer { background: var(--offwhite); color: var(--burgundy); padding: 80px 0 0; font-size: 15px; border-top: 4px solid var(--gold); margin-top: 0; }
    .footer-top { max-width: 1200px; margin: 0 auto; padding: 0 16px 60px; display: grid; grid-template-columns: 1.2fr 0.9fr 0.9fr 1.2fr; gap: 40px; border-bottom: 1px solid var(--gold); }
    .footer-col h4 { color: var(--burgundy); font-size: 15px; margin-bottom: 24px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; opacity: 1; }
    .footer-col ul { list-style: none; padding: 0; margin: 0; }
    .footer-col li { margin-bottom: 16px; }
    .footer-col a { color: var(--burgundy); text-decoration: none; transition: all 0.2s; font-size: 15px; opacity: 0.8; }
    .footer-col a:hover { color: var(--gold); padding-left: 4px; opacity: 1; }
    .footer-brand { font-size: 32px; font-weight: 700; margin-bottom: 20px; letter-spacing: 0.02em; color: var(--burgundy); }
    .footer-desc { color: var(--burgundy); line-height: 1.7; margin-bottom: 24px; max-width: 320px; font-size: 15px; opacity: 0.8; }
    .footer-bottom { max-width: 1200px; margin: 0 auto; padding: 32px 16px; display: flex; justify-content: space-between; align-items: center; color: var(--burgundy); font-size: 14px; opacity: 0.8; }
    .footer-social { display: flex; gap: 16px; margin-top: 24px; }
    .footer-social a { 
      color: var(--burgundy); opacity: 0.7; transition: all 0.3s ease; 
      width: 40px; height: 40px; border-radius: 0; background: transparent; border: 1px solid var(--burgundy);
      display: grid; place-items: center;
    }
    .footer-social a:hover { opacity: 1; background: var(--burgundy); color: var(--gold); border-color: var(--burgundy); transform: translateY(-3px); }
    .footer-social svg { width: 20px; height: 20px; }
    
    .newsletter-form { display: flex; gap: 10px; margin-top: 20px; }
    .newsletter-input { 
      background: var(--offwhite); border: 1px solid var(--burgundy); 
      padding: 12px 16px; border-radius: 2px; color: var(--burgundy); flex: 1; font-size: 15px; outline: none; 
      transition: border-color 0.3s;
    }
    .newsletter-input:focus { border-color: var(--gold); background: var(--offwhite); }
    .newsletter-btn { 
      background: var(--offwhite); color: var(--burgundy); border: 1px solid var(--divider); padding: 12px 24px; 
      border-radius: 2px; cursor: pointer; font-weight: 600; font-size: 15px; 
      transition: all 0.3s; white-space: nowrap; 
    }
    .newsletter-btn:hover { background: var(--gold); color: var(--burgundy); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(212, 175, 55, 0.3); }
    
    @media (max-width: 1024px) { .footer-top { gap: 24px; } }
    @media (max-width: 900px) { .footer-top { grid-template-columns: 1fr 1fr; gap: 40px; } }
    @media (max-width: 600px) { .footer-top { grid-template-columns: 1fr; } .footer-bottom { flex-direction: column; gap: 20px; text-align: center; } }
    
    /* AI Overlay */
    .ai-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: var(--offwhite);
        z-index: 2100;
        align-items: center;
        justify-content: center;
    }
    .ai-panel {
        width: 400px;
        max-width: 90vw;
        background: var(--offwhite);
        border-radius: 2px;
        padding: 20px;
        box-shadow: none;
        border: 1px solid var(--divider);
    }
    .ai-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 16px;
        font-weight: 600;
    }
    .ai-content {
        min-height: 100px;
        max-height: 300px;
        overflow-y: auto;
        margin-bottom: 16px;
        font-size: 14px;
        color: var(--text);
        white-space: pre-wrap;
    }
    .ai-input-group {
        display: flex;
        gap: 8px;
    }
    .ai-input {
        flex: 1;
        padding: 8px 12px;
        border: 1px solid var(--divider);
        border-radius: 2px;
        font-size: 14px;
    }
    .ai-btn {
        padding: 8px 16px;
        background: var(--offwhite);
        color: var(--burgundy);
        border: 1px solid var(--divider);
        border-radius: 2px;
        cursor: pointer;
        font-size: 14px;
    }
    .ai-btn:disabled {
        opacity: 0.7;
        cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div id="site-shell"></div>

  <main id="page-content">
  <script>try{window.injectLandingBanner&&window.injectLandingBanner()}catch(e){}</script>
  <div class="container">
    <!-- SIDEBAR FILTERS -->
    <aside class="sidebar">
      <div class="filter-group">
        <div class="filter-title">Categories</div>
        <ul class="filter-list" id="category-list">
          <!-- Populated by JS -->
        </ul>
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="content" id="main-content">
      <!-- Populated by JS -->
    </main>
  </div>
  </main>

  <!-- AI FAB -->
  <div class="ai-fab" id="ai-fab">Ask Harvics AI</div>
  <div class="ai-overlay" id="ai-overlay">
    <div class="ai-panel">
        <div class="ai-header">
            <span>Harvics Intelligence</span>
            <span id="ai-close" style="cursor:pointer">&times;</span>
        </div>
        <div class="ai-content" id="ai-output">
            How can I assist you with Industrial Solutions today?
        </div>
        <div class="ai-input-group">
            <input type="text" class="ai-input" id="ai-input" placeholder="Ask about specs, availability...">
            <button class="ai-btn" id="ai-send">Send</button>
        </div>
    </div>
  </div>

  <script src="product-data.js"></script>
  <script src="script.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // 1. Render Industrial Content
      if (typeof productCatalog !== 'undefined') {
        const mainContent = document.getElementById('main-content');
        const categoryList = document.getElementById('category-list');
        
        let html = '<h1 class="page-title">Industrial & Chemical Solutions</h1>';
        let sidebarHtml = '';

        // Combine Industrial and Chemical categories
        const sections = [
            { id: 'general', title: 'Industrial Equipment & Materials', data: productCatalog.industrial },
            { id: 'chemical', title: 'Chemical Commodities', data: productCatalog.commodities.industrialChem }
        ];

        sections.forEach(section => {
          const products = section.data;
          if (products && products.length > 0) {
            sidebarHtml += `<li><a href="#${section.id}">${section.title}</a></li>`;
            
            html += `
              <section id="${section.id}" style="margin-bottom: 64px; scroll-margin-top: 120px;">
                <h2 style="font-size: 20px; margin-bottom: 24px; border-bottom: 1px solid var(--divider); padding-bottom: 8px; color: var(--burgundy);">${section.title}</h2>
                <div class="product-grid">
                  ${products.map((p, i) => {
                     const imageUrl = getProductImage(p.keywords);
                     return `
                      <div class="product-card">
                        <div class="product-image" style="background-color: var(--bg-secondary); background-image: url('${imageUrl}'); background-size: cover; background-position: center;"></div>
                        <div class="product-info">
                          <div class="product-name">${p.name}</div>
                          <div class="product-price">${p.price}</div>
                        </div>
                      </div>
                     `;
                  }).join('')}
                </div>
              </section>
            `;
          }
        });

        mainContent.innerHTML = html;
        categoryList.innerHTML = sidebarHtml;
      }
      
      // AI Panel Logic
      const aiFab=document.getElementById("ai-fab");
      const aiOverlay=document.getElementById("ai-overlay");
      const aiClose=document.getElementById("ai-close");
      if(aiFab&&aiOverlay&&aiClose){
        aiFab.addEventListener("click",function(){aiOverlay.style.display="flex";});
        aiClose.addEventListener("click",function(){aiOverlay.style.display="none";});
        aiOverlay.addEventListener("click",function(e){if(e.target===aiOverlay){aiOverlay.style.display="none";}});
        document.addEventListener("keydown",function(e){if(e.key==="Escape"){aiOverlay.style.display="none";}});
      }

      const input = document.getElementById("ai-input");
      const button = document.getElementById("ai-send");
      const output = document.getElementById("ai-output");

      if (button && input && output) {
        button.addEventListener("click", function () {
          const promptText = input.value.trim();
          if (!promptText) {
            output.textContent = "Please type something to ask.";
            return;
          }
          button.disabled = true;
          output.textContent = "Thinking...";
          intelligenceLayer
            .askAi(promptText)
            .then(function (answer) {
              output.textContent = answer;
            })
            .finally(function () {
              button.disabled = false;
            });
        });
      }
    });
  </script>
</body>
</html>
