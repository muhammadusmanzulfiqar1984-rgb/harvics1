<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minerals — Precious — Silver • Harvics</title>
  <link rel="stylesheet" href="/root.css">
  <link rel="stylesheet" href="root.css">
  <link rel="stylesheet" href="../root.css">
  <link rel="stylesheet" href="../../root.css">
  <link rel="stylesheet" href="../../../root.css">
  <link rel="stylesheet" href="../../../../root.css">
</head>
<body>
  <div id="site-shell"></div>
  <main id="page-content">
    <nav style="max-width:1200px;margin:24px auto 0;padding:0 16px;font-size:13px;color:var(--text-2)">
      <a href="/index.html" style="color:var(--burgundy)">Home</a>
      <span style="opacity:.6"> / </span>
      <a href="/index.html#minerals" style="color:var(--burgundy)">Minerals</a>
      <span style="opacity:.6"> / </span>
      <span>Precious</span>
      <span style="opacity:.6"> / </span>
      <strong style="color:var(--burgundy)">Silver</strong>
    </nav>
    <section class="catalog-hero tint">
      <div style="max-width:1200px;margin:0 auto;padding:48px 24px;">
        <h1 style="font-size:clamp(1.8rem,4vw,2.6rem);color:var(--burgundy);font-weight:700;letter-spacing:0.02em;">Silver — Precious</h1>
        <p id="catalog-desc" style="max-width:720px;color:var(--text);opacity:0.85"></p>
        <div style="margin-top:16px;display:flex;gap:12px">
          <a href="/contact.html" style="padding:10px 14px;border:1px solid var(--gold);color:var(--burgundy);text-decoration:none">Request Quote</a>
          <a href="/index.html#minerals" style="padding:10px 14px;border:1px solid var(--divider);color:var(--burgundy);text-decoration:none">Back to Minerals</a>
        </div>
      </div>
    </section>
  </main>
  <script>
  (function(){
    var paths = ["/script.js","../script.js","../../script.js","../../../script.js","./script.js"];
    var i = 0;
    function load(){
      if (i >= paths.length) return;
      var s = document.createElement("script");
      s.src = paths[i++];
      s.onload = function(){
        if (typeof window.injectPageDescription === "function") {
          window.injectPageDescription({ key: "navMinerals", section: "Precious", item: "Silver" });
        }
      };
      s.onerror = load;
      document.body.appendChild(s);
    }
    load();
  })();
  </script>
</body>
</html>
