<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ask Harvics AI - Q&A</title>
  <link rel="stylesheet" href="root.css">
  <style>
    body {
      background-color: var(--ivory);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
    }
    .qa-wrapper {
      max-width: 800px;
      margin: 120px auto 60px;
      padding: 40px;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      border-top: 4px solid var(--gold);
    }
    .qa-header {
      text-align: center;
      margin-bottom: 40px;
    }
    .qa-header h1 {
      color: var(--burgundy);
      font-size: 36px;
      margin-bottom: 12px;
    }
    .qa-header p {
      color: var(--text-2);
      font-size: 18px;
    }
    .qa-interface {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .input-row {
      display: flex;
      gap: 16px;
    }
    #ai-input {
      flex: 1;
      padding: 16px;
      font-size: 16px;
      border: 1px solid var(--divider);
      border-radius: 4px;
      outline: none;
      transition: border-color 0.2s;
    }
    #ai-input:focus {
      border-color: var(--burgundy);
    }
    #ai-send {
      padding: 0 32px;
      background: var(--burgundy);
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    #ai-send:hover {
      background: var(--burgundy-deep);
    }
    #ai-send:disabled {
      background: var(--text-2);
      cursor: not-allowed;
    }
    .response-area {
      min-height: 200px;
      padding: 24px;
      background: var(--offwhite);
      border-radius: 4px;
      border: 1px solid var(--divider);
      line-height: 1.6;
      font-size: 16px;
      white-space: pre-wrap;
    }
    .response-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-2);
      margin-bottom: 8px;
      display: block;
    }
  </style>
</head>
<body>
  <!-- Layout shell for header/footer injection -->
  <div id="site-shell"></div>

  <main id="page-content">
    <div class="qa-wrapper">
      <div class="qa-header">
        <h1>Harvics Intelligence</h1>
        <p>Ask questions about our global sourcing, logistics, and industries.</p>
      </div>
      
      <div class="qa-interface">
        <div class="input-row">
          <input type="text" id="ai-input" placeholder="Type your question here (e.g., 'What industries do you serve?')..." autocomplete="off">
          <button id="ai-send">Ask AI</button>
        </div>
        
        <div>
          <span class="response-label">AI Response</span>
          <div id="ai-output" class="response-area">Ready for your question...</div>
        </div>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
